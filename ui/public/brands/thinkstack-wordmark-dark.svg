<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" width="360" height="80" role="img" aria-label="ThinkStack">
  <!-- ThinkStack lockup — dark variant (black tile, black "T" channels, white
       wordmark) for dark surfaces / dark mode. In-app recreation only; use the
       official ThinkStack files outside Paperclip. Wordmark is a bold geometric
       sans stand-in for the licensed brand face. -->
  <defs>
    <linearGradient id="ts-wmd" gradientUnits="userSpaceOnUse" x1="2" y1="32" x2="62" y2="32">
      <stop offset="0" stop-color="#e85d4a"/>
      <stop offset="0.4" stop-color="#f5a623"/>
      <stop offset="0.62" stop-color="#f7d038"/>
      <stop offset="1" stop-color="#5cb85c"/>
    </linearGradient>
    <clipPath id="ts-wmd-clip"><rect x="1" y="1" width="62" height="62" rx="15"/></clipPath>
  </defs>
  <g transform="translate(8,8)">
    <rect x="1" y="1" width="62" height="62" rx="15" fill="#0a0a0c"/>
    <g clip-path="url(#ts-wmd-clip)">
      <rect x="1" y="1" width="62" height="62" fill="url(#ts-wmd)"/>
      <path d="M40 1 L63 1 L63 26 Z" fill="#5cb85c"/>
      <g stroke="#0a0a0c" stroke-width="8" stroke-linecap="round">
        <line x1="39" y1="0" x2="64" y2="27"/>
        <line x1="51" y1="13" x2="7" y2="61"/>
      </g>
    </g>
  </g>
  <text x="90" y="40" dominant-baseline="central" font-family="Poppins, 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="700" font-size="42" letter-spacing="-1" fill="#ffffff">ThinkStack</text>
</svg>
